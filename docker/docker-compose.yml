services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sui
      POSTGRES_PASSWORD: sui
      POSTGRES_DB: deepbook_indexer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sui -d deepbook_indexer"]
      interval: 2s
      timeout: 2s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: sui
      PGPASSWORD: sui
      PGDATABASE: deepbook_indexer
    volumes:
      - ../migrations:/migrations:ro
    command: >
      sh -c "
        for f in /migrations/*.sql; do
          echo \"Running migration: $$f\";
          psql -f \"$$f\" || exit 1;
        done;
        echo \"All migrations completed successfully\";
      "

  api:
    build:
      context: ../api-go
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://sui:sui@postgres:5432/deepbook_indexer
      API_LISTEN_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
    ports:
      - "8080:8080"

  indexer:
    build:
      context: ..
      dockerfile: indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://sui:sui@postgres:5432/deepbook_indexer
      # Testnet config (change to mainnet if needed)
      RPC_API_URL: https://fullnode.testnet.sui.io:443
      DEEPBOOK_PACKAGE_ID: "0x9ae1cbfb7475f6a4c2d4d3273335459f8f9d265874c4d161c1966cdcbd4e9ebc"
      DEEPBOOK_EVENT_TYPE: OrderFilled
      INDEXER_POLL_INTERVAL_MS: "1000"
      RUST_LOG: info
    command: ["run"]

volumes:
  pgdata:
